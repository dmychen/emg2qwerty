# @package _global_
module:
  _target_: emg2qwerty.lightning.BiLSTMCTCModule
  in_features: 528  # freq * channels = (n_fft // 2 + 1) * 16
  mlp_features: [384]
  cnn_hidden_dim: 256
  lstm_hidden_dim: 256
  lstm_layers: 4
  dropout: 0.3

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 2khz emg means 4 sec window
  padding: [1800, 200]  # 900ms past plus 100ms future context
